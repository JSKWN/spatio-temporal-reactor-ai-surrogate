# 모델 하이퍼파라미터 (SE-B2)
# 근거: 03_attention_and_position.md, 2026-04-14 Conditional LAPE 적용 검토.md

# --- 공간 인코더 ---
encoder:
  d_latent: 128               # 잠재 차원. 21ch 입력 정보 보존 (03 §1.3)
  n_stages: 3                 # attention stage 수 (03 §1.3)
  num_heads: 4                # head 수. head_dim = 128/4 = 32 (03 §1.3)
  ffn_expand: 4               # FFN 확장 비율. hidden = 128*4 = 512
  lape_type: 'conditional'    # 'conditional': ConditionalLAPE3D, 'single': LearnedAbsolutePE3D
  init_scale: 0.02            # LAPE 초기화 stddev (ViT 표준)
  dropout: 0.0                # attention/FFN dropout
  rope_base: 10000.0          # STRING base 주파수 (RoPE 표준)

# --- 격자 ---
grid:
  z_dim: 20                   # 축방향 노드 수
  qh_dim: 6                   # halo 포함 H 격자 (quarter 5 + halo 1)
  qw_dim: 6                   # halo 포함 W 격자 (quarter 5 + halo 1)
  z_pitch_cm: 10.0            # Z축 물리 간격 (cm)
  xy_pitch_cm: 21.6           # XY축 물리 간격 (cm, assembly pitch)

# --- 입출력 ---
data:
  c_in: 21                    # 입력 채널: state(10) + xs_fuel(10) + rod_map(1)
  c_out: 10                   # 출력 채널: state 10종
  symmetry_type: 'mirror'     # 현재 100LP 기준. HDF5 metadata와 일치 필수
